  # Monero Wallet RPC (view-only, handles payment detection)
  wallet-rpc:
    image: ghcr.io/sethforprivacy/simple-monero-wallet-rpc:latest
    container_name: selfdroid-wallet-rpc
    network_mode: host
    restart: unless-stopped
    command:
      - --daemon-address=${MONERO_DAEMON_ADDRESS:-http://127.0.0.1:18081}
      - ${MONERO_NETWORK_FLAG:--testnet}
      - --trusted-daemon
      - --rpc-bind-port=18088
      - --disable-rpc-login
      - --wallet-file=/wallet/${MONERO_WALLET_FILE:-wallet_viewonly}
      - --password=${MONERO_WALLET_PASSWORD:-apples123}
      - --no-initial-sync
    environment:
      - MONERO_NETWORK=${MONERO_NETWORK:-mainnet}
    volumes:
      - ./wallet_data:/wallet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18088/json_rpc", "-d", '{"jsonrpc":"2.0","id":"0","method":"get_version"}', "-H", "Content-Type: application/json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Selfdroid Flask web app
  flask:
    build:
      context: ./src
      dockerfile: ../Dockerfile
    container_name: selfdroid-flask
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - app_data:/app/app_data
      - ./wallet_data:/app/wallet_data
    environment:
      - MONERO_WALLET_RPC_URL=http://localhost:18088/json_rpc
      - MONERO_NETWORK=${MONERO_NETWORK:-mainnet}
    depends_on:
      - wallet-rpc
    networks:
      - selfdroid

volumes:
  app_data:

networks:
  selfdroid:
    driver: bridge
